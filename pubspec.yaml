name: agent_watcher
description: "A macOS GUI for the beads (bd) issue tracker."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  go_router: ^17.1.0
  http: ^1.6.0
  json_annotation: ^4.11.0
  macos_ui: ^2.2.2
  package_info_plus: ^9.0.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
