name: agent_watcher
description: "A macOS GUI for the beads (bd) issue tracker."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0-113.2.beta

dependencies:
  cupertino_icons: ^1.0.8
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  macos_ui: ^2.2.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
